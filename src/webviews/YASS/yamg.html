<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAMG Generator</title>
    <style>
        :root {
            --background: var(--vscode-editor-background);
            --foreground: var(--vscode-editor-foreground);
            --card-bg: var(--vscode-editorWidget-background);
            --border: var(--vscode-widget-border);
            --accent: var(--vscode-textLink-foreground);
            --button-bg: var(--vscode-button-background);
            --button-fg: var(--vscode-button-foreground);
            --button-hover: var(--vscode-button-hoverBackground);
            --input-bg: var(--vscode-input-background);
            --input-fg: var(--vscode-input-foreground);
            --input-border: var(--vscode-input-border);
        }

        body {
            font-family: var(--vscode-font-family);
            background-color: var(--background);
            color: var(--foreground);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 30px;
            box-sizing: border-box;
        }

        .section {
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 20px;
        }

        .section:last-child {
            border-bottom: none;
        }

        h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-weight: 600;
            font-size: 1.1em;
            opacity: 0.9;
        }

        .form-row {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-size: 0.9em;
            font-weight: 500;
            opacity: 0.8;
        }

        input,
        select {
            padding: 8px;
            background: var(--input-bg);
            color: var(--input-fg);
            border: 1px solid var(--input-border);
            border-radius: 4px;
            font-family: inherit;
        }

        input:focus,
        select:focus {
            outline: 1px solid var(--accent);
            border-color: var(--accent);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .checkbox-group input {
            width: auto;
        }

        .btn {
            background-color: var(--button-bg);
            color: var(--button-fg);
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            font-size: 1em;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .warning-box {
            background: rgba(255, 165, 0, 0.1);
            border: 1px solid orange;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.9em;
            margin-bottom: 20px;
            color: var(--foreground);
        }

        .mech-params {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed var(--border);
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="warning-box">
            NOTE: Generating code will make a request to <strong>yamgen.com</strong> to fetch the latest templates.
            <br><strong>Generator: YAMG (Yet Another Mechanism Generator)</strong>
        </div>

        <div class="section">
            <div class="form-group">
                <label>Subsystem Name</label>
                <input type="text" id="subsystemName" placeholder="e.g. ElevatorSubsystem" value="ElevatorSubsystem">
            </div>
        </div>

        <div class="section">
            <h3>Mechanism Configuration</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Mechanism Type</label>
                    <select id="mechanismType">
                        <option value="Elevator">Elevator</option>
                        <option value="Arm">Arm</option>
                        <option value="Pivot">Pivot (Turret/Wrist)</option>
                    </select>
                </div>
            </div>

            <!-- Dynamic Sim Params based on type -->
            <div id="elevatorParams" class="mech-params">
                <div class="form-row">
                    <div class="form-group"><label>Min Height (m)</label><input type="number" step="0.01" id="minHeight"
                            value="0.0"></div>
                    <div class="form-group"><label>Max Height (m)</label><input type="number" step="0.01" id="maxHeight"
                            value="1.0"></div>
                    <div class="form-group"><label>Drum Radius (m)</label><input type="number" step="0.001"
                            id="drumRadius" value="0.05"></div>
                    <div class="form-group"><label>Mass (kg)</label><input type="number" step="0.1" id="mass"
                            value="5.0"></div>
                </div>
            </div>

            <div id="armParams" class="mech-params" style="display:none;">
                <div class="form-row">
                    <div class="form-group"><label>Arm Length (m)</label><input type="number" step="0.01" id="armLength"
                            value="0.75"></div>
                    <div class="form-group"><label>Min Angle (deg)</label><input type="number" step="1" id="minAngle"
                            value="0"></div>
                    <div class="form-group"><label>Max Angle (deg)</label><input type="number" step="1" id="maxAngle"
                            value="90"></div>
                    <div class="form-group"><label>Mass (kg)</label><input type="number" step="0.1" id="armMass"
                            value="5.0"></div>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>Motor Configuration</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Motor Controller</label>
                    <select id="controllerType">
                        <option value="SparkMax">SparkMax</option>
                        <option value="SparkFlex">SparkFlex</option>
                        <option value="TalonFX">TalonFX</option>
                        <option value="TalonFXS">TalonFXS</option>
                        <option value="ThriftyNova">ThriftyNova</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Motor Type</label>
                    <select id="motorType">
                        <!-- Populated mostly for SparkMax/Flex -->
                        <option value="NEO">NEO</option>
                        <option value="NEO550">NEO 550</option>
                        <option value="Vortex">NEO Vortex</option>
                        <option value="Minion">Minion</option>
                        <option value="Krakenx60">Kraken X60</option>
                        <option value="Krakenx44">Kraken X44</option>
                    </select>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>CAN ID</label>
                    <input type="number" id="canId" value="1">
                </div>
                <div class="form-group">
                    <label>Gear Ratio (X:1)</label>
                    <input type="number" id="gearRatio" value="1.0" step="0.01">
                </div>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="brakeMode" checked>
                <label for="brakeMode">Brake Mode</label>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="inverted">
                <label for="inverted">Inverted</label>
            </div>
            <div class="form-row" style="margin-top:10px;">
                <div class="form-group">
                    <label>Stator Current Limit (A)</label>
                    <input type="number" id="statorLimit" value="40">
                </div>
                <div class="form-group">
                    <label>Supply Current Limit (A)</label>
                    <input type="number" id="supplyLimit" value="40">
                </div>
            </div>
        </div>

        <div class="section">
            <h3>Control (PID + FF)</h3>
            <div class="form-row">
                <div class="form-group"><label>kP</label><input type="number" step="0.0001" id="kP" value="0.0"></div>
                <div class="form-group"><label>kI</label><input type="number" step="0.0001" id="kI" value="0.0"></div>
                <div class="form-group"><label>kD</label><input type="number" step="0.0001" id="kD" value="0.0"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>kS</label><input type="number" step="0.0001" id="kS" value="0.0"></div>
                <div class="form-group"><label>kV</label><input type="number" step="0.0001" id="kV" value="0.0"></div>
                <div class="form-group"><label>kA</label><input type="number" step="0.0001" id="kA" value="0.0"></div>
                <div class="form-group"><label>kG</label><input type="number" step="0.0001" id="kG" value="0.0"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Max Velocity</label><input type="number" step="0.1" id="maxVelocity"
                        value="1.0"></div>
                <div class="form-group"><label>Max Acceleration</label><input type="number" step="0.1"
                        id="maxAcceleration" value="1.0"></div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Control Type</label>
                    <select id="controlType">
                        <option value="Motor">Motor Controller (On-board PID)</option>
                        <option value="WPILib">WPILib (Rio PID)</option>
                        <option value="Tunable">Tunable (Shuffleboard PID)</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>Telemetry</h3>
            <div class="form-row">
                <div class="form-group"><label>NetworkTables Key</label><input type="text" id="ntKey" value="Subsystem">
                </div>
                <div class="form-group">
                    <label>Position Unit</label>
                    <select id="positionUnit">
                        <option value="Rotations">Rotations</option>
                        <option value="Meters">Meters</option>
                        <option value="Degrees">Degrees</option>
                        <option value="Radians">Radians</option>
                    </select>
                </div>
            </div>
            <div class="checkbox-group">
                <input type="checkbox" id="logPosition" checked><label for="logPosition">Log Position</label>
                <input type="checkbox" id="logVelocity" checked><label for="logVelocity">Log Velocity</label>
                <input type="checkbox" id="logCurrent" checked><label for="logCurrent">Log Current</label>
                <input type="checkbox" id="logVoltage" checked><label for="logVoltage">Log Voltage</label>
                <input type="checkbox" id="logTemperature"><label for="logTemperature">Log Temp</label>
            </div>
        </div>

        <button class="btn" id="generateBtn">Generate YAMG Subsystem</button>

    </div>
</body>
<script>
    const vscode = acquireVsCodeApi();

    const mechTypeSelect = document.getElementById('mechanismType');
    const elevParams = document.getElementById('elevatorParams');
    const armParams = document.getElementById('armParams');

    mechTypeSelect.addEventListener('change', () => {
        const val = mechTypeSelect.value;
        elevParams.style.display = 'none';
        armParams.style.display = 'none';

        if (val === 'Elevator') {
            elevParams.style.display = 'block';
        } else if (val === 'Arm' || val === 'Pivot') {
            armParams.style.display = 'block';
        }
    });

    document.getElementById('generateBtn').addEventListener('click', () => {
        const data = {
            subsystemName: document.getElementById('subsystemName').value,
            mechanismType: document.getElementById('mechanismType').value,

            // Motor
            motorControllerType: document.getElementById('controllerType').value,
            motorType: document.getElementById('motorType').value,
            canId: document.getElementById('canId').value,
            gearRatio: document.getElementById('gearRatio').value,
            brakeMode: document.getElementById('brakeMode').checked,
            inverted: document.getElementById('inverted').checked,
            enableStatorLimit: true, // simplified
            statorCurrentLimit: document.getElementById('statorLimit').value,
            enableSupplyLimit: true, // simplified
            supplyCurrentLimit: document.getElementById('supplyLimit').value,

            // Control
            pidValues: {
                kP: document.getElementById('kP').value,
                kI: document.getElementById('kI').value,
                kD: document.getElementById('kD').value
            },
            kS: document.getElementById('kS').value,
            kV: document.getElementById('kV').value,
            kA: document.getElementById('kA').value,
            kG: document.getElementById('kG').value,
            maxVelocity: document.getElementById('maxVelocity').value,
            maxAcceleration: document.getElementById('maxAcceleration').value,
            // Interpreted fields
            controlType: document.getElementById('controlType').value,

            // Sim Params (Elevator)
            minHeight: document.getElementById('minHeight').value,
            maxHeight: document.getElementById('maxHeight').value,
            drumRadius: document.getElementById('drumRadius').value,
            mass: document.getElementById('mass').value,

            // Sim Params (Arm/Pivot) - we'll just send all, backend filters
            armLength: document.getElementById('armLength').value,
            minAngle: document.getElementById('minAngle').value,
            maxAngle: document.getElementById('maxAngle').value,
            armMass: document.getElementById('armMass').value,

            // Telemetry
            ntKey: document.getElementById('ntKey').value,
            positionUnit: document.getElementById('positionUnit').value,
            logPosition: document.getElementById('logPosition').checked,
            logVelocity: document.getElementById('logVelocity').checked,
            logCurrent: document.getElementById('logCurrent').checked,
            logVoltage: document.getElementById('logVoltage').checked,
            logTemperature: document.getElementById('logTemperature').checked,
        };

        vscode.postMessage({ command: 'generateYAMS', data });
    });

</script>

</html>
