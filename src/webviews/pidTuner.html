<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PID Tuner</title>
    <style>
        :root {
            --background: var(--vscode-editor-background);
            --foreground: var(--vscode-editor-foreground);
            --sidebar-bg: var(--vscode-sideBar-background);
            --input-bg: var(--vscode-input-background);
            --input-fg: var(--vscode-input-foreground);
            --input-border: var(--vscode-input-border);
            --button-bg: var(--vscode-button-background);
            --button-fg: var(--vscode-button-foreground);
            --button-hover: var(--vscode-button-hoverBackground);
            --border-color: var(--vscode-panel-border);
            --success-color: var(--vscode-testing-iconPassed);
            --error-color: var(--vscode-testing-iconFailed);
        }

        body {
            font-family: var(--vscode-font-family);
            font-size: var(--vscode-font-size);
            background-color: var(--background);
            color: var(--foreground);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 15px 20px;
            font-weight: 600;
            border-bottom: 1px solid var(--border-color);
        }

        .connection-status {
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--error-color);
        }

        .status-indicator.connected {
            background: var(--success-color);
        }

        .subsystem-list {
            flex: 1;
            overflow-y: auto;
        }

        .subsystem-item {
            padding: 10px 20px;
            cursor: pointer;
            border-bottom: 1px solid rgba(128, 128, 128, 0.1);
        }

        .subsystem-item:hover {
            background: var(--vscode-list-hoverBackground);
        }

        .subsystem-item.active {
            background: var(--vscode-list-activeSelectionBackground);
            color: var(--vscode-list-activeSelectionForeground);
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .toolbar {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn {
            background-color: var(--button-bg);
            color: var(--button-fg);
            border: none;
            padding: 6px 14px;
            border-radius: 2px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn:hover {
            background-color: var(--button-hover);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--foreground);
        }

        .content-area {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .tuner-section {
            max-width: 900px;
            margin: 0 auto;
        }

        .pid-header {
            margin-bottom: 20px;
            font-size: 1.2em;
            font-weight: bold;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        /* Control Rows Layout */
        .control-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            align-items: flex-start;
        }

        .control-item {
            flex: 1;
            min-width: 0;
            /* Prevents overflow */
            background: rgba(128, 128, 128, 0.05);
            padding: 15px;
            border-radius: 4px;
        }

        .control-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9em;
            font-weight: 600;
        }

        .control-label .value-display {
            color: var(--vscode-textLink-foreground);
            font-family: monospace;
        }

        /* Sliders and Inputs */
        input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: var(--input-bg);
            outline: none;
            -webkit-appearance: none;
            margin-bottom: 8px;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--button-bg);
            cursor: pointer;
        }

        input[type="number"] {
            width: 100%;
            box-sizing: border-box;
            background: var(--input-bg);
            color: var(--input-fg);
            border: 1px solid var(--input-border);
            padding: 4px 8px;
            border-radius: 2px;
        }

        /* Read-only displays */
        .readonly-display {
            font-size: 1.2em;
            font-family: monospace;
            text-align: center;
            padding: 10px;
            background: var(--input-bg);
            border-radius: 4px;
            border: 1px solid var(--input-border);
        }

        /* Graph */
        .graph-container {
            margin-top: 30px;
            padding: 15px;
            background: rgba(128, 128, 128, 0.05);
            border-radius: 4px;
            height: 350px;
            position: relative;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="sidebar-header">PID Controllers</div>
        <div class="connection-status">
            <div class="status-indicator" id="statusIndicator"></div>
            <span id="statusText">Disconnected</span>
        </div>
        <div class="subsystem-list" id="subsystemList">
            <div class="empty-state" style="padding: 20px;">
                <p>No PID controllers detected</p>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="toolbar">
            <div class="connection-controls" style="display: flex; gap: 10px; align-items: center;">
                <input type="text" id="ipAddress" placeholder="Team # or IP" value="127.0.0.1"
                    style="background: var(--input-bg); color: var(--input-fg); border: 1px solid var(--input-border); padding: 6px; border-radius: 2px; width: 150px;">
                <button class="btn" id="connectBtn">Connect</button>
            </div>
            <button class="btn btn-secondary" id="refreshBtn">Refresh</button>
            <div style="flex: 1"></div>
            <button class="btn" id="saveBtn" disabled>Save to Constants</button>
        </div>

        <div class="content-area">
            <div class="tuner-section" id="tunerSection">
                <div class="empty-state">
                    <h2>🎛️ PID Tuner</h2>
                    <p>Connect to robot to start tuning</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const vscode = acquireVsCodeApi();
        let currentController = null;
        let pidData = {}; // Stores current values
        let graphData = {
            times: [],
            measurements: [],
            setpoints: [],
            outputs: []
        };
        let graphCtx = null;
        let isDrawing = false;
        let startTime = Date.now();

        // Connect
        document.getElementById('connectBtn').addEventListener('click', () => {
            const ip = document.getElementById('ipAddress').value || '127.0.0.1';
            vscode.postMessage({ command: 'connect', address: ip });
        });

        // Refresh
        document.getElementById('refreshBtn').addEventListener('click', () => {
            vscode.postMessage({ command: 'refresh' });
        });

        // Save
        document.getElementById('saveBtn').addEventListener('click', () => {
            if (currentController && pidData[currentController]) {
                vscode.postMessage({
                    command: 'save',
                    controller: currentController,
                    values: pidData[currentController]
                });
            }
        });

        // Messages
        window.addEventListener('message', event => {
            const message = event.data;
            switch (message.command) {
                case 'connectionStatus':
                    updateConnectionStatus(message.connected);
                    break;
                case 'controllers':
                    updateControllerList(message.controllers);
                    break;
                case 'pidValues':
                    // If we receive new values for the current controller, update graph and UI
                    if (message.controller === currentController) {
                        updatePIDUI(message.values);
                        updateGraphData(message.values);
                    }
                    // Always store latest data
                    if (!pidData[message.controller]) pidData[message.controller] = {};
                    Object.assign(pidData[message.controller], message.values);
                    break;
                case 'saveResult':
                    if (message.ok) alert('Saved!');
                    else alert('Error: ' + message.error);
                    break;
            }
        });

        function updateConnectionStatus(connected) {
            const indicator = document.getElementById('statusIndicator');
            const text = document.getElementById('statusText');
            if (connected) {
                indicator.classList.add('connected');
                text.textContent = 'Connected';
                document.getElementById('connectBtn').textContent = 'Disconnect';
            } else {
                indicator.classList.remove('connected');
                text.textContent = 'Disconnected';
                document.getElementById('connectBtn').textContent = 'Connect';
            }
        }

        function updateControllerList(controllers) {
            const list = document.getElementById('subsystemList');
            if (!controllers || controllers.length === 0) {
                list.innerHTML = '<div class="empty-state" style="padding:20px;"><p>No controllers</p></div>';
                return;
            }
            list.innerHTML = '';
            controllers.forEach(controller => {
                const item = document.createElement('div');
                item.className = 'subsystem-item';
                item.textContent = controller;
                if (controller === currentController) item.classList.add('active');
                item.onclick = () => selectController(controller);
                list.appendChild(item);
            });
        }

        function selectController(controller) {
            currentController = controller;
            // Reset graph
            graphData = { times: [], measurements: [], setpoints: [], outputs: [] };
            startTime = Date.now();

            document.querySelectorAll('.subsystem-item').forEach(item => {
                item.classList.toggle('active', item.textContent === controller);
            });

            // Clear UI initially
            document.getElementById('tunerSection').innerHTML = '<div class="empty-state"><p>Loading...</p></div>';

            vscode.postMessage({ command: 'getValues', controller: controller });
        }

        function createControlItem(key, label, val, min = 0, max = 1, step = 0.0001, readonly = false) {
            if (readonly) {
                return `
                    <div class="control-item">
                        <div class="control-label"><span>${label || key}</span></div>
                        <div class="readonly-display">${val !== undefined ? val.toFixed(4) : '-'}</div>
                    </div>
                `;
            }
            const valSafe = val !== undefined ? val : 0;
            return `
                <div class="control-item">
                    <div class="control-label">
                        <span>${label || key}</span>
                        <span class="value-display" id="disp-${key}">${valSafe.toFixed(4)}</span>
                    </div>
                    <input type="range" id="slider-${key}" min="${min}" max="${max}" step="${step}" value="${valSafe}" oninput="onInput('${key}', this.value)">
                    <input type="number" id="input-${key}" value="${valSafe}" step="${step}" onchange="onChange('${key}', this.value)">
                </div>
            `;
        }

        // Expose handlers globally
        window.onInput = (key, val) => {
            const input = document.getElementById(`input-${key}`);
            const disp = document.getElementById(`disp-${key}`);
            if (input) input.value = val;
            if (disp) disp.textContent = parseFloat(val).toFixed(4);
            sendUpdate(key, val);
        };

        window.onChange = (key, val) => {
            const slider = document.getElementById(`slider-${key}`);
            const disp = document.getElementById(`disp-${key}`);
            if (slider) slider.value = val;
            if (disp) disp.textContent = parseFloat(val).toFixed(4);
            sendUpdate(key, val);
        };

        function sendUpdate(key, val) {
            if (!currentController) return;
            const floatVal = parseFloat(val);
            if (isNaN(floatVal)) return;

            if (!pidData[currentController]) pidData[currentController] = {};
            pidData[currentController][key] = floatVal;

            vscode.postMessage({
                command: 'updatePID',
                controller: currentController,
                param: key,
                value: floatVal
            });
        }

        function updatePIDUI(values) {
            // Check if structure exists, if not create it
            const section = document.getElementById('tunerSection');
            if (!section.querySelector('.pid-container')) {
                // Initial render
                renderStructure(values);
            } else {
                // Update specific values strictly to avoid layout jank
                for (const [key, val] of Object.entries(values)) {
                    if (typeof val !== 'number') continue;

                    const slider = document.getElementById(`slider-${key}`);
                    const input = document.getElementById(`input-${key}`);
                    const disp = document.getElementById(`disp-${key}`);

                    if (slider && document.activeElement !== slider) slider.value = val;
                    if (input && document.activeElement !== input) input.value = val;
                    if (disp) disp.textContent = val.toFixed(4);
                }
            }
        }

        function renderStructure(values) {
            // Group keys
            // Mappings handles case insensitivity and aliases
            const findVal = (aliases) => {
                for (const a of aliases) {
                    if (values[a] !== undefined) return { key: a, val: values[a] };
                    // Check mixed case
                    const match = Object.keys(values).find(k => k.toLowerCase() === a.toLowerCase());
                    if (match) return { key: match, val: values[match] };
                }
                return { key: aliases[0], val: undefined };
            };

            // Helper to generate a control block for a set of possible keys
            const renderControl = (aliases, label, min, max, step, readonly) => {
                const { key, val } = findVal(aliases);
                return createControlItem(key, label, val, min, max, step, readonly);
            };

            const html = `
                <div class="pid-header">${currentController}</div>
                <div class="pid-container">
                    
                    <!-- PID Row -->
                    <div class="control-row">
                        ${renderControl(['p', 'kP'], 'P', 0, 10, 0.0001)}
                        ${renderControl(['i', 'kI'], 'I', 0, 10, 0.0001)}
                        ${renderControl(['d', 'kD'], 'D', 0, 10, 0.0001)}
                    </div>

                    <!-- FF Row -->
                    <div class="control-row">
                        ${renderControl(['kS', 's'], 'S', 0, 12, 0.0001)}
                        ${renderControl(['kV', 'v'], 'V', 0, 12, 0.0001)}
                        ${renderControl(['kA', 'a'], 'A', 0, 5, 0.0001)}
                        ${renderControl(['kG', 'g'], 'G', 0, 5, 0.0001)}
                    </div>

                    <!-- Range Row -->
                    <div class="control-row">
                        ${renderControl(['minOutput', 'min'], 'Min Output', -1, 0, 0.01)}
                        ${renderControl(['maxOutput', 'max'], 'Max Output', 0, 1, 0.01)}
                    </div>

                    <!-- Setpoint Row -->
                    <div class="control-row">
                        ${renderControl(['setpoint'], 'Setpoint', -100, 100, 0.1)}
                    </div>

                    <!-- Errors Row (Read Only) -->
                    <div class="control-row">
                         ${renderControl(['total error'], 'Total Error', 0, 0, 0, true)}
                         ${renderControl(['previous error'], 'Prev Error', 0, 0, 0, true)}
                    </div>
                    <div>
                        Use this Website to calculate your PID values: <a href="https://www.reca.lc">https://www.reca.lc</a>
                        <br>
                    
                    </div>

                </div>
                
                <div class="graph-container">
                    <canvas id="pidGraph"></canvas>
                </div>
            `;

            document.getElementById('tunerSection').innerHTML = html;

            // Init Graph
            initGraph();
            document.getElementById('saveBtn').disabled = false;
        }

        function updateGraphData(values) {
            const time = (Date.now() - startTime) / 1000;
            // Handle lowercase measurement/setpoint matching just in case
            const getVal = (keys, def = 0) => {
                for (const k of keys) {
                    if (values[k] !== undefined) return values[k];
                    const m = Object.keys(values).find(x => x.toLowerCase() === k.toLowerCase());
                    if (m) return values[m];
                }
                // If not found in current update, fallback to stored data?
                if (pidData[currentController]) {
                    for (const k of keys) {
                        if (pidData[currentController][k] !== undefined) return pidData[currentController][k];
                    }
                }
                return def;
            };

            const measurement = getVal(['measurement']);
            const setpoint = getVal(['setpoint']);
            const output = getVal(['output']);

            graphData.times.push(time);
            graphData.measurements.push(measurement);
            graphData.setpoints.push(setpoint);
            if (!graphData.outputs) graphData.outputs = [];
            graphData.outputs.push(output);

            // Keep only last 10 seconds of data (approx 500 points at 20ms)
            if (graphData.times.length > 500) {
                graphData.times.shift();
                graphData.measurements.shift();
                graphData.setpoints.shift();
                if (graphData.outputs) graphData.outputs.shift();
            }

            drawGraph();
        }

        function initGraph() {
            const canvas = document.getElementById('pidGraph');
            if (!canvas) return;
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            graphCtx = canvas.getContext('2d');
            graphCtx.scale(dpr, dpr);
        }

        function drawGraph() {
            if (!graphCtx || !graphData.times.length) return;
            const canvas = document.getElementById('pidGraph');
            const width = canvas.width / (window.devicePixelRatio || 1);
            const height = canvas.height / (window.devicePixelRatio || 1);
            const ctx = graphCtx;

            ctx.clearRect(0, 0, width, height);

            // Background grid
            ctx.fillStyle = getComputedStyle(document.body).getPropertyValue('--vscode-editor-background');
            ctx.fillRect(0, 0, width, height);

            const times = graphData.times;
            const maxTime = times[times.length - 1];
            const minTime = times[0];
            const timeRange = maxTime - minTime || 1;

            // X Helper
            const getX = (t) => ((t - minTime) / timeRange) * width;

            // --- Primary Axis (Measurement/Setpoint) ---
            let minP = Math.min(...graphData.measurements, ...graphData.setpoints);
            let maxP = Math.max(...graphData.measurements, ...graphData.setpoints);
            let rangeP = maxP - minP;
            if (rangeP < 0.1) rangeP = 1;
            const padP = rangeP * 0.1;
            minP -= padP; maxP += padP; rangeP = maxP - minP;

            const getY_Primary = (v) => height - ((v - minP) / rangeP) * height;

            // --- Secondary Axis (Output) ---
            const outputs = graphData.outputs || [];
            let minS = 0, maxS = 0;
            if (outputs.length) {
                minS = Math.min(...outputs);
                maxS = Math.max(...outputs);
            }
            if (minS > -1) minS = -1;
            if (maxS < 1) maxS = 1;

            let rangeS = maxS - minS;
            if (rangeS < 0.1) rangeS = 1;
            const padS = rangeS * 0.1;
            minS -= padS; maxS += padS; rangeS = maxS - minS;

            const getY_Secondary = (v) => height - ((v - minS) / rangeS) * height;

            // Draw Zero Lines
            ctx.lineWidth = 1;

            // Primary Zero
            if (minP < 0 && maxP > 0) {
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                const y0 = getY_Primary(0);
                ctx.moveTo(0, y0);
                ctx.lineTo(width, y0);
                ctx.stroke();
            }

            // Secondary Zero
            if (minS < 0 && maxS > 0) {
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(255, 100, 100, 0.2)';
                const y0 = getY_Secondary(0);
                ctx.moveTo(0, y0);
                ctx.lineTo(width, y0);
                ctx.stroke();
            }

            // Draw Path Helper
            const drawPath = (data, getColor, getYFunc) => {
                if (!data || !data.length) return;
                ctx.beginPath();
                ctx.strokeStyle = getColor;
                ctx.lineWidth = 2;
                for (let i = 0; i < times.length; i++) {
                    const x = getX(times[i]);
                    const y = getYFunc(data[i]);
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.stroke();
            };

            // Draw Output (Red - Secondary)
            if (outputs.length) drawPath(outputs, '#FF5252', getY_Secondary);

            // Draw Setpoint (Green - Primary)
            drawPath(graphData.setpoints, '#4CAF50', getY_Primary);

            // Draw Measurement (Blue - Primary)
            drawPath(graphData.measurements, '#2196F3', getY_Primary);

            // Legend
            ctx.font = 'bold 12px monospace';

            ctx.fillStyle = '#4CAF50';
            const spVal = graphData.setpoints.length ? graphData.setpoints[graphData.setpoints.length - 1] : 0;
            ctx.fillText(`SP: ${spVal.toFixed(2)}`, 10, 20);

            ctx.fillStyle = '#2196F3';
            const meVal = graphData.measurements.length ? graphData.measurements[graphData.measurements.length - 1] : 0;
            ctx.fillText(`PV: ${meVal.toFixed(2)}`, 10, 35);

            ctx.fillStyle = '#FF5252';
            const outVal = outputs.length ? outputs[outputs.length - 1] : 0;
            const outText = `OUT: ${outVal.toFixed(2)}`;
            const textWidth = ctx.measureText(outText).width;
            ctx.fillText(outText, width - textWidth - 10, 20);
        }

        // Handle resize
        window.onresize = () => {
            initGraph();
            drawGraph();
        };

    </script>
</body>

</html>
